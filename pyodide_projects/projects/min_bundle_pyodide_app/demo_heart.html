<!doctype html>
<html>
<head>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; }
        #canvas { display: block; width: 100%; height: 100%;}
    </style>
    <!-- Check https://github.com/pyodide/pyodide/releases to see if more recent releases are available -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
</head>
<body>
<canvas id="canvas" tabindex="0"></canvas>
<script type="text/javascript">
    // ====================== Start of Python code ============================
    pythonCode = `
import time
import numpy as np

from imgui_bundle import implot, imgui, immapp, hello_imgui, icons_fontawesome_4, __version__

# Fill x and y whose plot is a heart
vals = np.arange(0, np.pi * 2, 0.01)
x = np.power(np.sin(vals), 3) * 16
y = 13 * np.cos(vals) - 5 * np.cos(2 * vals) - 2 * np.cos(3 * vals) - np.cos(4 * vals)
# Heart pulse rate and time tracking
phase = 0.0
t0 = time.time() + 0.2
heart_pulse_rate = 80


def gui():
    global heart_pulse_rate, phase, t0, x, y

    imgui.text("Made with " + icons_fontawesome_4.ICON_FA_HEART + " using Dear ImGui and ImPlot")
    imgui.text(f"Running at {hello_imgui.frame_rate():.1f} FPS")

    t = time.time()
    phase += (t - t0) * heart_pulse_rate / (np.pi * 2)
    k = 0.8 + 0.1 * np.cos(phase)
    t0 = t

    implot.begin_plot("Heart", immapp.em_to_vec2(21, 21))
    implot.plot_line("", x * k, y * k)
    implot.end_plot()

    imgui.set_next_item_width(hello_imgui.em_size(10))
    _, heart_pulse_rate = imgui.slider_float("Pulse", heart_pulse_rate, 30, 180)

    imgui.text(f"Dear ImGui Bundle, version {__version__}")


if __name__ == "__main__":
    immapp.run(gui, window_size=(300, 450), window_title="Hello!", with_implot=True, fps_idle=0)

`
    // ====================== End of Python code ==============================


    async function main(){
        // This enables to use right click in the canvas
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Load Pyodide
        let pyodide = await loadPyodide();

        // Setup SDL, cf https://pyodide.org/en/stable/usage/sdl.html
        // 1. Set the canvas for SDL2
        let sdl2Canvas = document.getElementById("canvas");
        pyodide.canvas.setCanvas2D(sdl2Canvas);
        // 2. SDL requires to enable an opt-in flag :
        pyodide._api._skip_unwind_fatal_error = true;

        // 3. Load imgui_bundle via micropip
        // We may use the imgui_bundle wheel included directly with pyodide CDN
        //      await micropip.install('imgui_bundle');
        // Or we may load a newer one (see code below)
        // Where to find recent pyodide wheels:
        //    1. Wheel used in the official demo
        //    https://traineq.org/imgui_bundle_online/projects/min_bundle_pyodide_app/imgui_bundle_wheel/
        //    2. Nightly builds: download a wheel directly from GitHub Actions
        //    https://github.com/pthom/imgui_bundle/actions/workflows/pyodide.yml
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        // load a newer wheel from a local url
        await micropip.install('imgui_bundle_wheel/imgui_bundle-1.92.602-cp313-cp313-pyodide_2025_0_wasm32.whl');

        // Run the Python code
        pyodide.runPython(pythonCode);
    }
    main();
</script>
</body>
</html>
