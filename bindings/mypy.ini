[mypy]
disable_error_code=attr-defined

warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_decorators = True
disallow_incomplete_defs = True
no_implicit_optional = True
strict_equality = True
warn_redundant_casts = True
disallow_untyped_defs = True
warn_unused_ignores = True
# disallow_untyped_calls = True

[mypy-imgui_bundle.python_backends.*]                                                                                                                  >
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-imgui_bundle.python_backends_disabled.*]                                                                                                                  >
ignore_errors = True

[mypy-imgui_bundle.demos_python.sandbox.compare_other_libs.*]
ignore_errors = True
[mypy-imgui_bundle.demos_python.sandbox.compare_wordle.*]
ignore_errors = True

[mypy-imgui_bundle.demos_python.*]
disable_error_code=attr-defined,no-untyped-def

[mypy-OpenGL.*]
ignore_missing_imports = True
[mypy-glfw.*]
ignore_missing_imports = True
[mypy-glm]
ignore_missing_imports = True
